<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Clash Infinity</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
}

h1 { color: gold; }

/* CARD FRAME */
.card {
  display: inline-block;
  width: 160px;
  height: 260px;
  margin: 10px;
  border-radius: 10px;
  background: linear-gradient(#d4a373, #8b5e34);
  padding: 5px;
  box-shadow: 0 0 10px black;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: scale(1.05);
}

/* CARD INNER */
.card-inner {
  background: #f5e6c8;
  height: 100%;
  border-radius: 8px;
  padding: 5px;
  position: relative;
}

.card-title {
  font-weight: bold;
  font-size: 14px;
  text-align: left;
}

.card-img {
  width: 100%;
  height: 90px;
  background-size: cover;
  background-position: center;
  margin: 5px 0;
  border: 2px solid #333;
}

.card-desc {
  font-size: 11px;
  height: 40px;
  overflow: hidden;
}

.card-stats {
  position: absolute;
  bottom: 5px;
  width: 90%;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
}

/* UI */
#hand { margin-top: 20px; }

#info { margin-top: 10px; }

</style>
</head>

<body>

<h1>⚡ Hero Clash: Infinity ⚡</h1>

<h2>❤️ <span id="pHP"></span> | Enemy ❤️ <span id="eHP"></span></h2>
<div id="info"></div>

<div id="hand"></div>

<script>

// ===== GAME DATA =====
let wave = parseInt(localStorage.getItem("wave")) || 1;
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = Math.floor(xp / 50) + 1;

let playerHP = 100 + level * 5;
let enemyHP = 100 + wave * 10;

let aiLevel = Math.floor(wave / 3);

// ===== CARDS =====
let cards = [
  {
    name:"Flame Emperor 🔥",
    atk:20, def:5,
    desc:"Burn attack that grows stronger",
    img:"https://picsum.photos/200?1",
    effect:"attack"
  },
  {
    name:"Thunder God ⚡",
    atk:25, def:3,
    desc:"High damage strike",
    img:"https://picsum.photos/200?2",
    effect:"attack"
  },
  {
    name:"Guardian Shield 🛡",
    atk:5, def:20,
    desc:"Strong defense",
    img:"https://picsum.photos/200?3",
    effect:"defense"
  },
  {
    name:"Healing Spirit 💚",
    atk:0, def:15,
    desc:"Restore HP",
    img:"https://picsum.photos/200?4",
    effect:"heal"
  },
  {
    name:"Shadow Assassin 🌑",
    atk:30, def:0,
    desc:"Critical strike chance",
    img:"https://picsum.photos/200?5",
    effect:"crit"
  }
];

// ===== DRAW CARDS =====
function draw() {
  let hand = document.getElementById("hand");
  hand.innerHTML = "";

  for (let i = 0; i < 3; i++) {
    let c = cards[Math.floor(Math.random()*cards.length)];

    let cardDiv = document.createElement("div");
    cardDiv.className = "card";

    cardDiv.innerHTML = `
      <div class="card-inner">
        <div class="card-title">${c.name}</div>
        <div class="card-img" style="background-image:url(${c.img})"></div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-stats">
          <span>ATK ${c.atk}</span>
          <span>DEF ${c.def}</span>
        </div>
      </div>
    `;

    cardDiv.onclick = () => play(c);

    hand.appendChild(cardDiv);
  }
}

// ===== PLAYER ACTION =====
function play(c) {
  if (c.effect === "attack") enemyHP -= c.atk;

  if (c.effect === "defense") playerHP += c.def;

  if (c.effect === "heal") playerHP += c.def;

  if (c.effect === "crit") {
    let crit = Math.random() < 0.5 ? c.atk * 2 : c.atk;
    enemyHP -= crit;
  }

  enemyTurn();
  update();
  draw();
}

// ===== AI =====
function enemyTurn() {
  if (aiLevel === 0) {
    playerHP -= Math.floor(Math.random()*10)+5;
  } else if (aiLevel === 1) {
    if (enemyHP < 40) enemyHP += 10;
    else playerHP -= Math.floor(Math.random()*15)+10;
  } else {
    if (playerHP < 40) playerHP -= 20;
    else if (enemyHP < 50) enemyHP += 15;
    else playerHP -= Math.floor(Math.random()*20)+10;
  }
}

// ===== UPDATE =====
function update() {
  document.getElementById("pHP").innerText = playerHP;
  document.getElementById("eHP").innerText = enemyHP;
  document.getElementById("info").innerText =
    "Wave " + wave + " | XP " + xp + " | Player Lv " + level + " | AI Lv " + aiLevel;

  if (enemyHP <= 0) {
    wave++;
    xp += 20;
    localStorage.setItem("wave", wave);
    localStorage.setItem("xp", xp);

    playerHP += 20;
    enemyHP = 100 + wave * 10;
  }

  if (playerHP <= 0) {
  alert("Game Over 💀");
  
  // reset values manually
  wave = 1;
  xp = 0;
  level = 1;
  playerHP = 100;
  enemyHP = 100;
  
  localStorage.clear();
  
  update();
  draw();
}
}

// START
draw();
update();

</script>

</body>
</html>
